version: '3.8'

services:
  backend-api:
    build: ./backend-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend-api:/app
    # Phải cài thêm uvicorn nếu chưa có trong requirements
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
