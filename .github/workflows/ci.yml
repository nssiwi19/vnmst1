name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          pip install ruff pytest
          pip install -r backend-api/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend-api/

      - name: Test (Placeholder)
        run: |
          # pytest backend-api/tests/ -v
          echo "Skipping tests for now — no tests directory yet."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  docker-verify:
    needs: [lint-and-test-backend, lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Build (Backend)
        run: docker build --target production ./backend-api
      - name: Verify Docker Build (Frontend)
        run: docker build --target production ./frontend
